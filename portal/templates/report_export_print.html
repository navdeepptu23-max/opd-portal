<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ payload.title }} - {{ payload.month_year }}</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
      color: #000;
      margin: 18px;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn {
      border: 1px solid #000;
      color: #000;
      background: #fff;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }
    h1 {
      font-size: 22px;
      margin: 0;
      color: #1a3c5e;
      font-weight: 800;
      letter-spacing: 0.03em;
    }
    .header-box {
      background: linear-gradient(135deg, #eaf2fb 0%, #f0faf2 100%);
      border: 1px solid #c5d8e8;
      border-radius: 10px;
      padding: 14px 18px 10px;
      margin-bottom: 14px;
    }
    .header-box .subtitle {
      font-size: 13px;
      font-weight: 700;
      color: #2a6f3b;
      margin-top: 4px;
    }
    .header-divider {
      height: 3px;
      background: linear-gradient(90deg, #1a3c5e, #2a9d5c, #1a3c5e);
      border: none;
      border-radius: 2px;
      margin: 6px 0 0;
    }
    .meta {
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 700;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #000;
      padding: 4px 6px;
      color: #000;
      background: #fff;
      vertical-align: top;
    }
    th {
      font-weight: 800;
    }
    @media print {
      .toolbar { display: none !important; }
      .header-box {
        background: #fff !important;
        border: 2px solid #000 !important;
      }
      .header-divider {
        background: #000 !important;
      }
      h1 { color: #000 !important; }
      .header-box .subtitle { color: #000 !important; }
      * {
        color: #000 !important;
        border-color: #000 !important;
      }
      td, th { background: #fff !important; }
      @page {
        margin: 8mm;
        size: A4 landscape;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn" onclick="window.print()">Print</button>
    <a class="btn" href="javascript:window.close();">Close</a>
  </div>

  <div class="header-box">
    <h1>{{ payload.title }}</h1>
    <div class="subtitle">Month-Year: {{ payload.month_year }} &nbsp;|&nbsp; User: {{ username }}</div>
    <hr class="header-divider">
  </div>

  <table>
    <thead>
      <tr>
        {% for head in payload.headers %}
        <th>{{ head }}</th>
        {% endfor %}
      </tr>
    </thead>
    <tbody>
      {% for row in payload.rows %}
      <tr>
        {% for col in row %}
        <td>{{ col }}</td>
        {% endfor %}
      </tr>
      {% else %}
      <tr>
        <td colspan="{{ payload.headers|length }}" style="text-align:center;">No data available for selected month.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
