{% extends 'base.html' %}
{% block title %}Dashboard – OPD Portal{% endblock %}

{% block content %}
<div class="page-header" style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
  <div>
    <h1>Dashboard</h1>
    <p>Welcome back, <strong>{{ current_user.username }}</strong></p>
  </div>
  {% if current_user.is_admin_or_above %}
  <a href="{{ url_for('register') }}" class="btn btn-primary">+ New User</a>
  {% endif %}
</div>

{% include 'dashboard_content.html' %}
{% endblock %}
