services:
  - type: web
    name: opd-portal
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: opd-db
          property: connectionString

databases:
  - name: opd-db
    databaseName: opdportal
    plan: free

