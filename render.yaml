# Manual deployment guide:
# 1. In Render dashboard, create a new Web Service
# 2. Connect your GitHub repo: https://github.com/navdeepptu23-max/opd-portal
# 3. Leave build command blank (Render reads Procfile)
# 4. Create a PostgreSQL database service in Render
# 5. Add DATABASE_URL env var to web service from the database connection string
# 6. Deploy

# This repo uses:
# - Procfile for start command
# - package.json for Node.js detection
# - .nvmrc for Node version

