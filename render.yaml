services:
  - type: web
    name: opd-portal
    runtime: python
    rootDir: portal
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: opd-db-new
          property: connectionString

databases:
  - name: opd-db-new
    databaseName: opdportal
    plan: free
    plan: free

