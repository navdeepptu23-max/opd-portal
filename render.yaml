databases:
  - name: opd-portal-db
    databaseName: opdportal
    user: opdportal

services:
  - type: web
    name: opd-portal
    runtime: node
    runtimeVersion: 20
    plan: free
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opd-portal-db
          property: connectionString
